    <rect x="922" y="141" width="166" height="4" rx="2" fill="#3A3A40"/>
    <rect x="922" y="162" width="126" height="4" rx="2" fill="#2E2E33"/>
    <rect x="922" y="183" width="90"  height="4" rx="2" fill="#282A2E"/>
  </g>
